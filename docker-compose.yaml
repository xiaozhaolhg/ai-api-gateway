services:
  gateway-service:
    build:
      context: .
      dockerfile: ./gateway-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      router-service:
        condition: service_healthy
      provider-service:
        condition: service_healthy
    networks:
      - ai-gateway
    environment:
      - AUTH_SERVICE_ADDRESS=auth-service:50051
      - ROUTER_SERVICE_ADDRESS=router-service:50052
      - PROVIDER_SERVICE_ADDRESS=provider-service:50053
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "50051:50051"
    volumes:
      - auth-service-data:/data
    networks:
      - ai-gateway
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  router-service:
    build:
      context: .
      dockerfile: ./router-service/Dockerfile
    ports:
      - "50052:50052"
    volumes:
      - router-service-data:/data
    depends_on:
      redis:
        condition: service_started
    networks:
      - ai-gateway
    environment:
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_TTL_SECONDS=300
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  provider-service:
    build:
      context: .
      dockerfile: ./provider-service/Dockerfile
    ports:
      - "50053:50053"
    volumes:
      - provider-service-data:/data
    depends_on:
      billing-service:
        condition: service_healthy
      monitor-service:
        condition: service_healthy
    networks:
      - ai-gateway
    environment:
      - BILLING_SERVICE_ADDRESS=billing-service:50054
      - MONITOR_SERVICE_ADDRESS=monitor-service:50055
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50053"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
    ports:
      - "50054:50054"
    volumes:
      - billing-service-data:/data
    networks:
      - ai-gateway
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50054"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  monitor-service:
    build:
      context: .
      dockerfile: ./monitor-service/Dockerfile
    ports:
      - "50055:50055"
    volumes:
      - monitor-service-data:/data
    networks:
      - ai-gateway
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50055"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    networks:
      - ai-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-gateway
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    networks:
      - ai-gateway
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ai-gateway:
    driver: bridge

volumes:
  auth-service-data:
  router-service-data:
  provider-service-data:
  billing-service-data:
  monitor-service-data:
  ollama-data:
