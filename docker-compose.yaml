  #     - ai-gateway
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  ai-gateway:
    driver: bridge

volumes:
  auth-service-data:
  router-service-data:
  provider-service-data:
  billing-service-data:
  monitor-service-data:
  ollama-data:
