services:
  gateway-service:
    build:
      context: .
      dockerfile: ./gateway-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - router-service
      - provider-service
    networks:
      - ai-gateway
    environment:
      - AUTH_SERVICE_ADDRESS=auth-service:50051
      - ROUTER_SERVICE_ADDRESS=router-service:50052
      - PROVIDER_SERVICE_ADDRESS=provider-service:50053

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "50051:50051"
    volumes:
      - auth-service-data:/data
    networks:
      - ai-gateway

  router-service:
    build:
      context: .
      dockerfile: ./router-service/Dockerfile
    ports:
      - "50052:50052"
    volumes:
      - router-service-data:/data
    depends_on:
      - redis
    networks:
      - ai-gateway
    environment:
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_TTL_SECONDS=300

  provider-service:
    build:
      context: .
      dockerfile: ./provider-service/Dockerfile
    ports:
      - "50053:50053"
    volumes:
      - provider-service-data:/data
    depends_on:
      - billing-service
      - monitor-service
    networks:
      - ai-gateway
    environment:
      - BILLING_SERVICE_ADDRESS=billing-service:50054
      - MONITOR_SERVICE_ADDRESS=monitor-service:50055
    extra_hosts:
      - "host.docker.internal:host-gateway"

  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
    ports:
      - "50054:50054"
    volumes:
      - billing-service-data:/data
    networks:
      - ai-gateway

  monitor-service:
    build:
      context: .
      dockerfile: ./monitor-service/Dockerfile
    ports:
      - "50055:50055"
    volumes:
      - monitor-service-data:/data
    networks:
      - ai-gateway

  admin-ui:
    build:
      context: .
      dockerfile: ./admin-ui/Dockerfile
      args:
        - VITE_API_BASE_URL=
    ports:
      - "3000:80"
    depends_on:
      - gateway-service
    networks:
      - ai-gateway

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-gateway

  # ollama:  # Commented out - Docker Hub pull issue in China
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
