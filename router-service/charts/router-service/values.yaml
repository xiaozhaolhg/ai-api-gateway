replicaCount: 1

image:
  repository: router-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: ai-gateway.local
  path: /
  pathType: Prefix

config:
  path: /app/config/config.yaml
  hostPath: ./configs/config.yaml

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi