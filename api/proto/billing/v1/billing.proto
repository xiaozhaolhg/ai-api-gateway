syntax = "proto3";

package billing.v1;

import "common/v1/common.proto";

option go_package = "github.com/ai-api-gateway/api/gen/billing/v1;billingv1";

service BillingService {
  // Callback (subscriber)
  rpc OnProviderResponse(common.v1.ProviderResponseCallback) returns (common.v1.Empty);

  // Direct Usage Recording
  rpc RecordUsage(RecordUsageRequest) returns (common.v1.Empty);

  // Usage Queries
  rpc GetUsage(GetUsageRequest) returns (ListUsageResponse);
  rpc GetUsageAggregation(GetUsageAggregationRequest) returns (ListUsageAggregationResponse);

  // Cost Estimation
  rpc EstimateCost(EstimateCostRequest) returns (CostEstimate);

  // Budget
  rpc CheckBudget(CheckBudgetRequest) returns (BudgetStatus);
  rpc CreateBudget(CreateBudgetRequest) returns (Budget);
  rpc UpdateBudget(UpdateBudgetRequest) returns (Budget);
  rpc DeleteBudget(DeleteBudgetRequest) returns (common.v1.Empty);
  rpc ListBudgets(ListBudgetsRequest) returns (ListBudgetsResponse);

  // Pricing
  rpc CreatePricingRule(CreatePricingRuleRequest) returns (PricingRule);
  rpc UpdatePricingRule(UpdatePricingRuleRequest) returns (PricingRule);
  rpc DeletePricingRule(DeletePricingRuleRequest) returns (common.v1.Empty);
  rpc ListPricingRules(ListPricingRulesRequest) returns (ListPricingRulesResponse);

  // Billing Account
  rpc GetBillingAccount(GetBillingAccountRequest) returns (BillingAccount);
  rpc CreateBillingAccount(CreateBillingAccountRequest) returns (BillingAccount);
  rpc UpdateBillingAccount(UpdateBillingAccountRequest) returns (BillingAccount);

  // Invoice (Phase 3+)
  rpc GenerateInvoice(GenerateInvoiceRequest) returns (Invoice);
  rpc GetInvoices(GetInvoicesRequest) returns (ListInvoicesResponse);
}

// Usage Recording
message RecordUsageRequest {
  string user_id = 1;
  string group_id = 2;
  string provider_id = 3;
  string model = 4;
  int64 prompt_tokens = 5;
  int64 completion_tokens = 6;
}

message UsageRecord {
  string id = 1;
  string user_id = 2;
  string group_id = 3;
  string provider_id = 4;
  string model = 5;
  int64 prompt_tokens = 6;
  int64 completion_tokens = 7;
  double cost = 8;
  int64 timestamp = 9;
}

message GetUsageRequest {
  string user_id = 1;
  string group_id = 2;
  string provider_id = 3;
  string model = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  int32 page = 7;
  int32 page_size = 8;
}

message ListUsageResponse {
  repeated UsageRecord records = 1;
  int32 total = 2;
}

// Usage Aggregation
message GetUsageAggregationRequest {
  string user_id = 1;
  string group_id = 2;
  string provider_id = 3;
  string model = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  string group_by = 7;  // "user_id" | "model" | "provider_id"
}

message UsageAggregation {
  string group_key = 1;              // user_id, model, or provider_id
  int64 total_prompt_tokens = 2;
  int64 total_completion_tokens = 3;
  double total_cost = 4;
  int64 request_count = 5;
}

message ListUsageAggregationResponse {
  repeated UsageAggregation aggregations = 1;
}

// Cost Estimation
message EstimateCostRequest {
  string model = 1;
  int64 prompt_tokens = 2;
  int64 completion_tokens = 3;
}

message CostEstimate {
  double estimated_cost = 1;
  string currency = 2;
  double price_per_prompt_token = 3;
  double price_per_completion_token = 4;
}

// Budget
message BudgetStatus {
  double current_spend = 1;
  double budget_limit = 2;
  double remaining = 3;
  double soft_cap_pct = 4;
  double hard_cap_pct = 5;
  bool soft_cap_exceeded = 6;
  bool hard_cap_exceeded = 7;
}

message Budget {
  string id = 1;
  string account_id = 2;
  double limit = 3;
  string period = 4;           // "daily" | "weekly" | "monthly"
  double soft_cap_pct = 5;
  double hard_cap_pct = 6;
  string status = 7;             // "active" | "paused"
}

message CheckBudgetRequest {
  string account_id = 1;
}

message CreateBudgetRequest {
  string account_id = 1;
  double limit = 2;
  string period = 3;
  double soft_cap_pct = 4;
  double hard_cap_pct = 5;
}

message UpdateBudgetRequest {
  string id = 1;
  double limit = 2;
  string period = 3;
  double soft_cap_pct = 4;
  double hard_cap_pct = 5;
  string status = 6;
}

message DeleteBudgetRequest {
  string id = 1;
}

message ListBudgetsRequest {
  string account_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListBudgetsResponse {
  repeated Budget budgets = 1;
  int32 total = 2;
}

// Pricing Rule
message PricingRule {
  string id = 1;
  string model = 2;
  string provider_id = 3;
  double price_per_prompt_token = 4;
  double price_per_completion_token = 5;
  string currency = 6;
}

message CreatePricingRuleRequest {
  string model = 1;
  string provider_id = 2;
  double price_per_prompt_token = 3;
  double price_per_completion_token = 4;
  string currency = 5;
}

message UpdatePricingRuleRequest {
  string id = 1;
  string model = 2;
  string provider_id = 3;
  double price_per_prompt_token = 4;
  double price_per_completion_token = 5;
  string currency = 6;
}

message DeletePricingRuleRequest {
  string id = 1;
}

message ListPricingRulesRequest {
  string model = 1;
  string provider_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListPricingRulesResponse {
  repeated PricingRule rules = 1;
  int32 total = 2;
}

// Billing Account
message BillingAccount {
  string id = 1;
  string name = 2;
  string billing_contact = 3;
  double credit_balance = 4;
  string status = 5;  // "active" | "suspended"
}

message GetBillingAccountRequest {
  string id = 1;
}

message CreateBillingAccountRequest {
  string name = 1;
  string billing_contact = 2;
  double initial_credit = 3;
}

message UpdateBillingAccountRequest {
  string id = 1;
  string name = 2;
  string billing_contact = 3;
  string status = 4;
}

// Invoice (Phase 3+)
message Invoice {
  string id = 1;
  string account_id = 2;
  int64 period_start = 3;
  int64 period_end = 4;
  double total_cost = 5;
  repeated InvoiceLineItem line_items = 6;
  string status = 7;           // "draft" | "finalized" | "paid"
}

message InvoiceLineItem {
  string description = 1;
  double amount = 2;
  int64 quantity = 3;
}

message GenerateInvoiceRequest {
  string account_id = 1;
  int64 period_start = 2;
  int64 period_end = 3;
}

message GetInvoicesRequest {
  string account_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  int32 total = 2;
}
