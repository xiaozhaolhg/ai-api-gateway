services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-gateway

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-gateway

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "50051:50051"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "50051"
      HOST: "0.0.0.0"
      REDIS_ADDR: "redis:6379"
    volumes:
      - auth_data:/data
    networks:
      - ai-gateway

  provider-service:
    build:
      context: .
      dockerfile: provider-service/Dockerfile
    ports:
      - "50053:50053"
    depends_on:
      ollama:
        condition: service_started
    environment:
      PORT: "50053"
      HOST: "0.0.0.0"
      OLLAMA_BASE_URL: "http://172.17.0.1:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - provider_data:/data
    networks:
      - ai-gateway

  router-service:
    build:
      context: .
      dockerfile: router-service/Dockerfile
    ports:
      - "50052:50052"
    depends_on:
      auth-service:
        condition: service_started
      provider-service:
        condition: service_started
    environment:
      PORT: "50052"
      HOST: "0.0.0.0"
      PROVIDER_ADDR: "172.20.0.2:50053"
      REDIS_ADDR: "redis:6379"
    networks:
      - ai-gateway

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      router-service:
        condition: service_started
      provider-service:
        condition: service_started
    environment:
      AUTH_SERVICE_ADDRESS: "auth-service:50051"
      ROUTER_SERVICE_ADDRESS: "router-service:50052"
      PROVIDER_SERVICE_ADDRESS: "provider-service:50053"
      BILLING_SERVICE_ADDRESS: "billing-service:50054"
      MONITOR_SERVICE_ADDRESS: "monitor-service:50055"
      REDIS_ADDR: "redis:6379"
    networks:
      - ai-gateway

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    ports:
      - "50054:50054"
    environment:
      PORT: "50054"
      HOST: "0.0.0.0"
    volumes:
      - billing_data:/data
    networks:
      - ai-gateway

  monitor-service:
    build:
      context: .
      dockerfile: monitor-service/Dockerfile
    ports:
      - "50055:50055"
    environment:
      PORT: "50055"
      HOST: "0.0.0.0"
    volumes:
      - monitor_data:/data
    networks:
      - ai-gateway

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway-service:
        condition: service_started
    environment:
      VITE_API_URL: "http://localhost:8080"
    networks:
      - ai-gateway

networks:
  ai-gateway:
    driver: bridge

volumes:
  ollama_data:
  provider_data:
  auth_data:
  billing_data:
  monitor_data:
