apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-service
  labels:
    {{- include "router-service.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "router-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "router-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: router-service
        image: router-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_PATH
          value: /app/config/config.yaml
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /app/config/config.yaml
          subPath: config.yaml
          readOnly: true
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: router-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: router-service
  labels:
    {{- include "router-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    {{- include "router-service.selectorLabels" . | nindent 4 }}