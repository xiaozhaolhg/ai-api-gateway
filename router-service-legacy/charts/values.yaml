replicaCount: 1

image:
  repository: router-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: ai-gateway.local
  path: /
  pathType: Prefix

config:
  path: /app/config/config.yaml
  data:
    server:
      port: "8080"
    provider:
      ollama:
        enabled: true
        endpoint: "http://host.docker.internal:11434"
        api_key: ""
      opencode_zen:
        enabled: false
        endpoint: "https://api.opencode.com"
        api_key: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi